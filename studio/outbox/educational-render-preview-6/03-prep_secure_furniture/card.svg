th="3"/><circle cx="124" cy="608.6" r="29" fill="#148A87"/><path d="M111 608.6 L121 619.6 L139 595.6" fill="none" stroke="#FBFCFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="184" y="619.6" font-family="'DejaVu Sans'" font-size="32" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="184" dy="0">Pindahkan benda berat dari rak paling atas.</tspan></text><line x1="96" y1="692.8" x2="984" y2="692.8" stroke="#EEF3F2" stroke-width="3"/><circle cx="124" cy="777" r="29" fill="#148A87"/><path d="M111 777 L121 788 L139 764" fill="none" stroke="#FBFCFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="184" y="788" font-family="'DejaVu Sans'" font-size="32" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="184" dy="0">Kunci roda pada perabot beroda.</tspan></text><line x1="96" y1="861.2" x2="984" y2="861.2" stroke="#EEF3F2" stroke-width="3"/><circle cx="124" cy="945.4000000000001" r="29" fill="#148A87"/><path d="M111 945.4000000000001 L121 956.4000000000001 L139 932.4000000000001" fill="none" stroke="#FBFCFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="184" y="956.4000000000001" font-family="'DejaVu Sans'" font-size="32" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="184" dy="0">Jauhkan tempat tidur dari kaca dan benda</tspan><tspan x="184" dy="40">gantung.</tspan></text><line x1="96" y1="1029.6" x2="984" y2="1029.6" stroke="#EEF3F2" stroke-width="3"/><circle cx="124" cy="1113.8" r="29" fill="#148A87"/><path d="M111 1113.8 L121 1124.8 L139 1100.8" fill="none" stroke="#FBFCFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="184" y="1124.8" font-family="'DejaVu Sans'" font-size="32" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="184" dy="0">Simpan barang pecah belah di rak bawah.</tspan></text><rect x="0" y="1232" width="1080" height="118" fill="#0A3742"/><rect x="0" y="1232" width="1080" height="3" fill="#C77B0A"/