<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img"><title>Kenali Wilayahmu - Ingat Rute ke Tempat Tinggi</title><rect x="0" y="0" width="1080" height="1350" fill="#EEF3F2"/><rect x="0" y="0" width="1080" height="300" fill="#0F4C5C"/><circle cx="945" cy="120" r="180" fill="#0A3742" opacity="0.45"/><path d="M0 260 C210 218 345 318 540 270 C760 214 870 254 1080 224 L1080 342 L0 342 Z" fill="#0A3742" opacity="0.55"/><rect x="60" y="56" width="435" height="58" rx="29" fill="#4169E1"/><text x="277.5" y="96" font-family="'DejaVu Sans', Arial, sans-serif" font-size="28" font-weight="700" fill="#FBFCFB" text-anchor="middle"><tspan x="277.5" dy="0">P1 / Kenali Wilayahmu</tspan></text><text x="60" y="166" font-family="'DejaVu Sans', Arial, sans-serif" font-size="28" font-weight="700" fill="#9FE1CB" text-anchor="start"><tspan x="60" dy="0">Kenali Wilayahmu</tspan></text><text x="60" y="234" font-family="'DejaVu Sans', Arial, sans-serif" font-size="64" font-weight="700" fill="#FBFCFB" text-anchor="start"><tspan x="60" dy="0">Ingat Rute ke Tempat</tspan><tspan x="60" dy="74">Tinggi</tspan></text><rect x="60" y="362" width="960" height="138" rx="14" fill="#FBFCFB"/><circle cx="116" cy="412" r="34" fill="#4169E1"/><text x="116" y="424" font-family="'DejaVu Sans', Arial, sans-serif" font-size="32" font-weight="700" fill="#FBFCFB" text-anchor="middle"><tspan x="116" dy="0">1</tspan></text><text x="176" y="404" font-family="'DejaVu Sans', Arial, sans-serif" font-size="34" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="176" dy="0">Kenali</tspan></text><text x="176" y="448" font-family="'DejaVu Sans', Arial, sans-serif" font-size="30" font-weight="400" fill="#293635" text-anchor="start"><tspan x="176" dy="0">Tentukan titik tinggi terdekat dari rumah.</tspan></text><rect x="60" y="567" width="960" height="148" rx="14" fill="#FBFCFB"/><circle cx="116" cy="617" r="34" fill="#4169E1"/><text x="116" y="629" font-family="'DejaVu Sans', Arial, sans-serif" font-size="32" font-weight="700" fill="#FBFCFB" text-anchor="middle"><tspan x="116" dy="0">2</tspan></text><text x="176" y="609" font-family="'DejaVu Sans', Arial, sans-serif" font-size="34" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="176" dy="0">Latih</tspan></text><text x="176" y="653" font-family="'DejaVu Sans', Arial, sans-serif" font-size="30" font-weight="400" fill="#293635" text-anchor="start"><tspan x="176" dy="0">Coba rute bersama keluarga saat kondisi</tspan><tspan x="176" dy="38">tenang.</tspan></text><rect x="60" y="772" width="960" height="148" rx="14" fill="#FBFCFB"/><circle cx="116" cy="822" r="34" fill="#4169E1"/><text x="116" y="834" font-family="'DejaVu Sans', Arial, sans-serif" font-size="32" font-weight="700" fill="#FBFCFB" text-anchor="middle"><tspan x="116" dy="0">3</tspan></text><text x="176" y="814" font-family="'DejaVu Sans', Arial, sans-serif" font-size="34" font-weight="700" fill="#0A3742" text-anchor="start"><tspan x="176" dy="0">Prioritaskan</tspan></text><text x="176" y="858" font-family="'DejaVu Sans', Arial, sans-serif" font-size="30" font-weight="400" fill="#293635" text-anchor="start"><tspan x="176" dy="0">Setelah gempa kuat dan lama, jauhi pantai</tspan><tspan x="176" dy="38">dan muara.</tspan></text><rect x="0" y="1232" width="1080" height="118" fill="#0A3742"/><text x="60" y="1278" font-family="'DejaVu Sans', Arial, sans-serif" font-size="26" font-weight="400" fill="#7FB7B8" text-anchor="start"><tspan x="60" dy="0">Notifikasi cepat — bukan peringatan dini.</tspan></text><text x="60" y="1314" font-family="'DejaVu Sans', Arial, sans-serif" font-size="26" font-weight="400" fill="#7FB7B8" text-anchor="start"><tspan x="60" dy="0">Selalu ikuti arahan resmi BMKG.</tspan></text><text x="1020" y="1298" font-family="'DejaVu Sans', Arial, sans-serif" font-size="30" font-weight="700" fill="#FBFCFB" text-anchor="end"><tspan x="1020" dy="0">@infogempapalu</tspan></text></svg>