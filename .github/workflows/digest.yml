# Twice-daily catch-up recap posted to the Telegram channel.
# Runs at 00:00 & 12:00 UTC = 08:00 & 20:00 WITA (morning & evening in Palu).
# Uses a 24h window each time, so even if GitHub drops one scheduled run, the
# next still covers the full day. Posts to the channel only (not individuals).
name: palu-quake-digest
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post recap to channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: node run.js --digest 24
